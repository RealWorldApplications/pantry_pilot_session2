name: Security & CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check for Code Formatting
        run: dart format --set-exit-if-changed .

      - name: Static Analysis (Security & Quality)
        run: flutter analyze

      - name: Check for Vulnerable Dependencies
        run: flutter pub outdated --fatal-security

      - name: Run Tests
        run: flutter test
